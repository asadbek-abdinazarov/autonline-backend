# Default values for autonline
# This is a YAML-formatted file.

replicaCount: 2

image:
  repository: autonline
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Database configuration (external PostgreSQL)
database:
  host: "postgresql.default.svc.cluster.local"
  port: 5432
  name: "autonline"
  username: "autonline_user"
  password: "" # Set via secret
  hibernateDdlAuto: "update"

# JWT Configuration
jwt:
  secret: "" # Set via secret
  expiration: 86400000 # 24 hours in milliseconds
  refreshExpiration: 604800000 # 7 days in milliseconds

# Storage configuration (DigitalOcean Spaces / S3)
storage:
  accessKey: "" # Set via secret
  secretKey: "" # Set via secret
  endpoint: "https://sfo3.digitaloceanspaces.com"
  region: "sfo3"
  bucket: "autonline"

# Application configuration
app:
  profile: "prod"
  serverPort: 8080
  cors:
    allowedOrigins:
      - "https://autonline.uz"
      - "https://www.autonline.uz"
      - "https://autonline-production.up.railway.app"
      - "https://autonline-admin-panel-production.up.railway.app"
  
  logging:
    level: "INFO"
    securityLevel: "INFO"
    configLevel: "INFO"

# Health check configuration
healthCheck:
  enabled: true
  path: "/actuator/health"
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 40
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

# Prometheus monitoring
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    path: /actuator/prometheus
    labels: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Environment variables (additional)
env: []
  # - name: CUSTOM_VAR
  #   value: "custom-value"

# Volume mounts
volumeMounts: []
  # - name: config
  #   mountPath: /app/config

volumes: []
  # - name: config
  #   configMap:
  #     name: custom-config
