apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "autonline.fullname" . }}
  labels:
    {{- include "autonline.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "autonline.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "autonline.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "autonline.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.port }}
          protocol: TCP
        env:
        # Spring Profile
        - name: SPRING_PROFILES_ACTIVE
          value: {{ .Values.app.profile | quote }}
        
        # Database Configuration
        - name: PGHOST
          value: {{ .Values.database.host | quote }}
        - name: PGPORT
          value: {{ .Values.database.port | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.database.name | quote }}
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: {{ include "autonline.fullname" . }}-secret
              key: database-username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "autonline.fullname" . }}-secret
              key: database-password
        - name: A_HIBERNATE_DDL_AUTO
          value: {{ .Values.database.hibernateDdlAuto | quote }}
        
        # JWT Configuration
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "autonline.fullname" . }}-secret
              key: jwt-secret
        - name: JWT_EXPIRATION
          value: {{ .Values.jwt.expiration | quote }}
        - name: JWT_REFRESH_EXPIRATION
          value: {{ .Values.jwt.refreshExpiration | quote }}
        
        # Storage Configuration
        - name: STORAGE_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "autonline.fullname" . }}-secret
              key: storage-access-key
        - name: STORAGE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "autonline.fullname" . }}-secret
              key: storage-secret-key
        - name: STORAGE_ENDPOINT
          value: {{ .Values.storage.endpoint | quote }}
        - name: STORAGE_REGION
          value: {{ .Values.storage.region | quote }}
        - name: STORAGE_BUCKET
          value: {{ .Values.storage.bucket | quote }}
        
        # Application Configuration
        - name: SERVER_PORT
          value: {{ .Values.app.serverPort | quote }}
        - name: ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: {{ include "autonline.fullname" . }}-config
              key: allowed-origins
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: {{ include "autonline.fullname" . }}-config
              key: log-level
        - name: SECURITY_LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: {{ include "autonline.fullname" . }}-config
              key: security-log-level
        - name: CONFIG_LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: {{ include "autonline.fullname" . }}-config
              key: config-log-level
        
        # Additional environment variables
        {{- with .Values.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        {{- with .Values.volumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
