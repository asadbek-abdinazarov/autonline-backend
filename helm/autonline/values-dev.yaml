# Development environment values
# This file overrides values.yaml for development

replicaCount: 1

image:
  repository: autonline
  pullPolicy: IfNotPresent
  tag: "dev"

# Database configuration (external PostgreSQL)
database:
  host: "localhost"  # Update with your dev database host
  port: 5432
  name: "autonline"
  username: "autonline_user"
  password: "autonline123"  # Set via secret in production
  hibernateDdlAuto: "update"

# JWT Configuration
jwt:
  secret: "feD65K4oszTmBRZIpO94QVgrqFaByXh72z7cENrVRDIqama4jKsdBAjA14StehYaH0D35Hen5skXYPmhNfY62ZDM1Klo24Jp1pZmTBH6qxsLfFYOSiScncyj9r8iiprRpIHFSVSSbF14CmVxJFdYHHXxDZQQrIA77PwKYFV0NoErQLIo0CZoISDFd7NxecmWmHlqRWSW"  # Dev secret - change in production
  expiration: 86400000 # 24 hours in milliseconds
  refreshExpiration: 604800000 # 7 days in milliseconds

# Storage configuration (DigitalOcean Spaces / S3)
storage:
  accessKey: "DO801WAZYEFG36XNUJER"  # Dev key - change in production
  secretKey: "Hp4mVdehQPoyCQvcqGLAXJFekEQ4avJjMlW4CXj0m3I"  # Dev key - change in production
  endpoint: "https://sfo3.digitaloceanspaces.com"
  region: "sfo3"
  bucket: "autonline"

# Application configuration
app:
  profile: "dev"
  serverPort: 8080
  cors:
    allowedOrigins:
      - "http://localhost:3000"
      - "http://localhost:3001"
      - "http://localhost:8080"
      - "https://autonline.uz"
      - "https://www.autonline.uz"
      - "https://autonline-production.up.railway.app"
      - "https://autonline-admin-panel-production.up.railway.app"
  logging:
    level: "DEBUG"
    securityLevel: "DEBUG"
    configLevel: "DEBUG"

# Resources for development (lower than production)
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

# Disable autoscaling in dev
autoscaling:
  enabled: false

# Disable PDB in dev
podDisruptionBudget:
  enabled: false

# Disable monitoring in dev (unless needed)
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
