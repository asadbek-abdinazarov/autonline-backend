apiVersion: "acid.zalan.do/v1"
kind: postgresql
metadata:
  name: autonline-prod
  namespace: production
spec:
  teamId: "autonline"
  volume:
    size: 20Gi
  numberOfInstances: 2  # High availability
  users:
    autonline_user:
    - superuser
    - createdb
  databases:
    autonline: autonline_user
  postgresql:
    version: "15"
    parameters:
      max_connections: "200"
      shared_buffers: "512MB"
      effective_cache_size: "2GB"
      maintenance_work_mem: "128MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "32MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "32MB"
      min_wal_size: "2GB"
      max_wal_size: "8GB"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
