spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/autonline}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:autonline_user}
    password: ${DB_PASSWORD:autonline123}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:your-very-long-and-secure-secret-key-that-should-be-at-least-256-bits-long-and-randomly-generated}
    expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds

# Logging Configuration
logging:
  level:
    uz.javachi.autonline: ${LOG_LEVEL:DEBUG}
    org.springframework.security: ${SECURITY_LOG_LEVEL:DEBUG}
    uz.javachi.autonline.config.security: DEBUG