spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${POSTGRES_DB}
    driver-class-name: org.postgresql.Driver
    username: ${PGUSER}
    password: ${PGPASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION} # 24 hours in milliseconds
    refresh:
      expiration: ${JWT_REFRESH_EXPIRATION} # 7 days in milliseconds
# Logging Configuration
logging:
  level:
    uz.javachi.autonline: ${LOG_LEVEL}
    org.springframework.security: ${SECURITY_LOG_LEVEL}
    uz.javachi.autonline.config.security: ${CONFIG_LOG_LEVEL}
server:
  port: ${SERVER_PORT}