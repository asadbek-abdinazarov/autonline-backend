spring:
  datasource:
    url: ${A_DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${A_DB_USERNAME}
    password: ${A_DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${A_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
# JWT Configuration
app:
  jwt:
    secret: ${A_JWT_SECRET}
    expiration: ${A_JWT_EXPIRATION} # 24 hours in milliseconds
accepted:
  origin: ${A_ACCEPTED_ORIGIN}
# Logging Configuration
logging:
  level:
    uz.javachi.autonline: ${A_LOG_LEVEL:DEBUG}
    org.springframework.security: ${A_SECURITY_LOG_LEVEL:DEBUG}
    uz.javachi.autonline.config.security: DEBUG
server:
  port: ${A_SERVER_PORT:8084}